<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playground - Topologic Games</title>
  <meta property="og:site_name" content="Topologic Games">
  <meta property="og:title" content="Topologic Games - Playground">
  <meta property="og:description" content="Watch or play chess and Go on impossible boards.">
  <meta property="og:image" content="https://games.kh3dron.net/og.png">
  <meta property="og:url" content="https://games.kh3dron.net/play.html">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="description" content="Watch or play chess and Go on impossible boards.">
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <link rel="stylesheet" href="/src/style.css">
</head>

<body>
  <div id="app">
    <nav id="sidebar">
      <a id="catalog-link" href="./index.html">&larr; Catalog</a>
      <h1 id="game-title">Chess</h1>
      <label id="slide-control" class="checkbox-control">
        <input type="checkbox" id="slide-board">
        <span>Animate</span>
      </label>
      <label id="boundary-control" class="checkbox-control">
        <input type="checkbox" id="show-boundaries">
        <span>Boundaries</span>
      </label>
      <div id="size-control">
        <span class="size-label">Board</span>
        <button class="size-btn" data-size="9">9</button>
        <button class="size-btn" data-size="13">13</button>
        <button class="size-btn" data-size="19">19</button>
      </div>
      <button id="pass-btn" class="action-btn">Pass</button>
      <a id="about-link" href="./about.html">About</a>
      <button id="reset">New Game</button>
    </nav>
    <main id="game-area">
      <div id="top-bar">
        <div id="status">White's turn</div>
        <div id="drag-hint">drag to pan</div>
        <div id="zoom-controls">
          <button id="zoom-out" title="Zoom out">-</button>
          <button id="zoom-level" title="Reset zoom">100%</button>
          <button id="zoom-in" title="Zoom in">+</button>
        </div>
      </div>
      <div id="board-container">
        <div id="board"></div>
      </div>
    </main>
    <aside id="info-panel">
      <details class="panel-section">
        <summary class="panel-label">1.0 Site</summary>
        <div id="site-blurb">Classic games on impossible boards. Each mode changes only what happens at the edges - wrap, reflect, rotate, or wall - and the whole game follows. <a href="./about.html">Read about the math</a>.</div>
      </details>
      <details class="panel-section" open>
        <summary class="panel-label">2.0 Rules</summary>
        <div id="mode-description"></div>
      </details>
      <details class="panel-section">
        <summary class="panel-label">3.0 Notes</summary>
        <div id="mode-article"></div>
      </details>
      <details class="panel-section">
        <summary class="panel-label">4.0 References</summary>
        <div id="mode-links"></div>
      </details>
      <details class="panel-section">
        <summary class="panel-label">5.0 Edge Spec</summary>
        <div id="mode-spec"></div>
      </details>
      <details class="panel-section">
        <summary class="panel-label">6.0 Legend</summary>
        <div id="seam-legend"></div>
      </details>
    </aside>
  </div>
  <script type="module" src="/src/play.ts"></script>
</body>

</html>
